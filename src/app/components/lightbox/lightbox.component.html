@if (photo(); as current) {
  <div
    class="lightbox-backdrop"
    role="dialog"
    aria-modal="true"
    aria-label="Visualização em tela cheia"
    (click)="backdropClick($event)"
  >
    <button type="button" class="lightbox-close" (click)="close()" aria-label="Fechar">
      <span aria-hidden="true">&times;</span>
    </button>

    <button
      type="button"
      class="lightbox-nav lightbox-prev"
      (click)="previous($event)"
      aria-label="Foto anterior"
    >
      <span aria-hidden="true">&#10094;</span>
    </button>

    <div class="lightbox-content">
      @if (loading()) {
        <div class="lightbox-spinner" aria-hidden="true"></div>
      }
      @if (loadError()) {
        <p class="lightbox-error" role="alert">Falha ao carregar a imagem.</p>
      }
      <img
        [src]="current.src"
        [alt]="current.alt"
        (load)="onImageLoad()"
        (error)="onImageError()"
        class="lightbox-image"
        width="1200"
        height="800"
      />
      <p class="lightbox-caption">{{ current.author }}</p>
    </div>

    <button
      type="button"
      class="lightbox-nav lightbox-next"
      (click)="next($event)"
      aria-label="Próxima foto"
    >
      <span aria-hidden="true">&#10095;</span>
    </button>
  </div>
}
